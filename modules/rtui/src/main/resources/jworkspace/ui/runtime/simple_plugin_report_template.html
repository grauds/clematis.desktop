<!-- 1. HEADER SECTION -->
<table style="width: 420px; border-collapse: collapse; table-layout: fixed;">
    <tr>
        <td style="word-wrap: break-word;">
            <h1 style="margin: 0 0 5px 0; color: #24292e; font-size: 18px; line-height: 1.2;">${title}</h1>
        </td>
    </tr>
    <tr>
        <td style="word-wrap: break-word;">
            <span style="color: #586069; font-size: 11px; background-color: #f6f8fa; padding: 2px 4px; border: 1px solid #e1e4e8; border-radius: 3px; font-weight: bold;">
                    Version: ${version}, build ${buildNumber}, ${buildDate}
            </span>
        </td>
    </tr>
    <tr>
        <td style="word-wrap: break-word;">
            <span style="color: #24588b; font-size: 11px; background-color: #f6f8fa; padding: 2px 4px; border: 1px solid #d0dbea; border-radius: 3px; font-weight: bold;">
                    Plugin Info: ${type}, ${level}, ${className}
            </span>
        </td>
    </tr>
    <tr>
        <td style="word-wrap: break-word;">
            <span style="font-size: 11px; padding: 2px 4px; border: 1px solid #d0dbea; border-radius: 3px; font-weight: bold;">
                    Home: ${home} ${jar}
            </span>
        </td>
    </tr>
</table>

${properties}
