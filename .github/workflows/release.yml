name: Package and Publish App (JDK 25)

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build Installer on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Add WiX Toolset to PATH
        if: matrix.os == 'windows-latest'
        run: echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $GITHUB_PATH
        shell: bash

      - name: Grant Execute Permission for Gradle Wrapper
        if: matrix.os != 'windows-latest'
        run: chmod +x ./gradlew

      - name: Run jpackage Task via Gradle
        run: ./gradlew :app:jpackage

      - name: Upload Installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || 'latest' }}
          files: |
            app/build/dist/**/*.exe
            app/build/dist/**/*.msi
            app/build/dist/**/*.dmg
            app/build/dist/**/*.deb
            app/build/dist/**/*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
